name: Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-server:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: brido_server -> target

      - name: Build server EXE
        working-directory: brido_server
        run: cargo build --release

      - name: Package server artifacts
        shell: pwsh
        run: |
          ./scripts/package_server_release.ps1 -Tag "${{ github.ref_name }}" -OutputDir "release_assets/server" -SkipBuild

      - name: Verify server artifacts
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $out = "release_assets/server"
          if (!(Test-Path "$out/brido-server-$tag.exe")) { throw "Missing EXE artifact" }
          if (!(Test-Path "$out/brido-server-$tag-bundle.zip")) { throw "Missing ZIP artifact" }
          if (!(Test-Path "$out/brido-server-$tag.sha256")) { throw "Missing checksum artifact" }

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-assets
          path: release_assets/server/*

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x brido_app/gradlew

      - name: Build debug APK
        working-directory: brido_app
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: brido_app/app/build/outputs/apk/debug/app-debug.apk

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required repository secret: ${secret_name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Tagged releases require signed Android release APK."
            exit 1
          fi

      - name: Decode Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/brido-release.keystore"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: brido_app
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/brido-release.keystore" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: brido_app/app/build/outputs/apk/release/app-release.apk

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-server
      - build-android

    steps:
      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-assets
          path: release_assets/server

      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: release_assets/android-debug

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: release_assets/android-release

      - name: Rename Android artifacts with tag
        run: |
          tag="${{ github.ref_name }}"
          mkdir -p release_assets/android
          cp "release_assets/android-debug/app-debug.apk" "release_assets/android/brido-android-debug-${tag}.apk"
          cp "release_assets/android-release/app-release.apk" "release_assets/android/brido-android-release-${tag}.apk"

      - name: Verify required release assets
        run: |
          tag="${{ github.ref_name }}"
          required_files=(
            "release_assets/server/brido-server-${tag}.exe"
            "release_assets/server/brido-server-${tag}-bundle.zip"
            "release_assets/server/brido-server-${tag}.sha256"
            "release_assets/android/brido-android-debug-${tag}.apk"
            "release_assets/android/brido-android-release-${tag}.apk"
          )
          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required release asset: $file"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release_assets/server/brido-server-${{ github.ref_name }}.exe
            release_assets/server/brido-server-${{ github.ref_name }}-bundle.zip
            release_assets/server/brido-server-${{ github.ref_name }}.sha256
            release_assets/android/brido-android-debug-${{ github.ref_name }}.apk
            release_assets/android/brido-android-release-${{ github.ref_name }}.apk
